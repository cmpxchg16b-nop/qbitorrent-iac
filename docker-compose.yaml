name: qb
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qb
    network_mode: "ns:/run/netns/qb"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=19080
    volumes:
      - qb-appconfig-vol:/config
      - "./downloads:/downloads"
      - "./resolv.conf:/etc/resolv.conf:ro"
    restart: unless-stopped
volumes:
  qb-appconfig-vol:
